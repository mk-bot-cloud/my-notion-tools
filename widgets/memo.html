<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box !important; }
        
        body { 
            background-color: #121212 !important; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; 
            min-height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif !important;
            padding: 10px 5px; 
        }

        .tabs-wrapper { 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            gap: 4px; 
            margin-bottom: 6px; 
            /* 横幅を180pxに縮小 */
            width: 180px;
            margin-left: 0;
        }

        #tabContainer {
            display: flex; 
            gap: 3px; 
            flex-wrap: wrap; 
        }

        .tab { 
            background: #222 !important; 
            color: #666 !important; 
            border: 1px solid #333 !important; 
            padding: 2px 5px !important; 
            border-radius: 4px; 
            font-size: 9px !important; 
            font-weight: bold; 
            cursor: pointer;
        }

        .tab.active { 
            background: #333 !important; 
            color: #ddd !important; 
            border-color: #444 !important;
        }

        .action-group {
            display: flex;
            gap: 2px;
        }

        .btn-page-ctrl { 
            background: #222 !important; 
            color: #666 !important; 
            border: 1px solid #333 !important; 
            border-radius: 4px; 
            width: 20px; 
            height: 20px; 
            cursor: pointer; 
            font-size: 12px !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-page-ctrl.confirm-delete { 
            color: #a33c3c !important; 
            border-color: #600 !important; 
            background: #300 !important;
        }

        .memo-container { 
            /* 横幅を180pxに縮小 */
            width: 180px; 
            height: 250px; /* 高さも少し抑えめに */
            background-color: #1a1a1a !important; 
            border-radius: 6px; 
            padding: 8px; 
            border: 1px solid #2a2a2a; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-left: 0;
        }

        textarea { 
            width: 100%; 
            height: 100%; 
            background: transparent !important; 
            border: none !important; 
            color: #ccc !important; 
            font-size: 12px !important; 
            line-height: 1.4 !important; 
            resize: none; 
            outline: none; 
            font-family: inherit !important; 
            text-align: left; 
        }

        textarea::-webkit-scrollbar { width: 3px; }
        textarea::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 6px; 
            padding-top: 4px;
            border-top: 1px solid #222;
        }
        
        .btn-time { 
            background: #222; 
            color: #777; 
            border: 1px solid #333; 
            padding: 1px 5px; 
            border-radius: 3px; 
            font-size: 7px; 
            font-weight: 600;
            cursor: pointer; 
        }

        .status { 
            font-size: 7px; 
            color: #444; 
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="tabs-wrapper">
        <div id="tabContainer"></div>
        <div class="action-group">
            <button id="addBtn" class="btn-page-ctrl">+</button>
            <button id="deleteBtn" class="btn-page-ctrl">−</button>
        </div>
    </div>
    <div class="memo-container">
        <textarea id="memoInput" placeholder="Write..."></textarea>
        <div class="controls">
            <button id="timeBtn" class="btn-time">TIMESTAMP</button>
            <div id="saveStatus" class="status">SAVED</div>
        </div>
    </div>

<script>
    const memoInput = document.getElementById('memoInput');
    const tabContainer = document.getElementById('tabContainer');
    const addBtn = document.getElementById('addBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const timeBtn = document.getElementById('timeBtn');
    const saveStatus = document.getElementById('saveStatus');
    
    const STORAGE_KEY = 'notion_memo_data_v5_compact';
    let pages = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[""]');
    let currentIndex = 0;
    let deleteConfirmMode = false;

    function renderTabs() {
        tabContainer.innerHTML = '';
        pages.forEach((_, idx) => {
            const btn = document.createElement('button');
            btn.className = `tab ${idx === currentIndex ? 'active' : ''}`;
            btn.textContent = idx + 1;
            btn.onclick = () => switchPage(idx);
            tabContainer.appendChild(btn);
        });
    }

    function switchPage(idx) {
        saveData();
        currentIndex = idx;
        memoInput.value = pages[currentIndex];
        resetDelete();
        renderTabs();
    }

    function saveData() {
        pages[currentIndex] = memoInput.value;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(pages));
    }

    addBtn.onclick = () => {
        if (pages.length >= 7) return; 
        saveData();
        pages.push("");
        currentIndex = pages.length - 1;
        memoInput.value = "";
        resetDelete();
        renderTabs();
        saveData();
    };

    deleteBtn.onclick = () => {
        if (pages.length <= 1) return;
        if (!deleteConfirmMode) {
            deleteConfirmMode = true;
            deleteBtn.classList.add('confirm-delete');
            saveStatus.textContent = 'DEL?';
            saveStatus.style.color = '#a33c3c';
        } else {
            pages.splice(currentIndex, 1);
            currentIndex = Math.max(0, currentIndex - 1);
            memoInput.value = pages[currentIndex];
            resetDelete();
            renderTabs();
            saveData();
        }
    };

    function resetDelete() {
        deleteConfirmMode = false;
        deleteBtn.classList.remove('confirm-delete');
        saveStatus.textContent = 'SAVED';
        saveStatus.style.color = '#444';
    }

    timeBtn.onclick = () => {
        const now = new Date();
        const stamp = `[${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}] `;
        const start = memoInput.selectionStart;
        memoInput.value = memoInput.value.substring(0, start) + stamp + memoInput.value.substring(memoInput.selectionEnd);
        memoInput.selectionStart = memoInput.selectionEnd = start + stamp.length;
        memoInput.focus();
        saveData();
    };

    memoInput.oninput = () => {
        saveData();
        saveStatus.textContent = '...';
        setTimeout(() => { if(!deleteConfirmMode) saveStatus.textContent = 'SAVED'; }, 800);
    };

    memoInput.value = pages[currentIndex];
    renderTabs();
</script>
</body>
</html>
