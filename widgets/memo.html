<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box !important; }
        
        body { 
            background-color: #191919 !important; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif !important;
            padding: 10px; /* 上下の余白を微調整 */
        }

        /* タイトルセクションを削除 */

        .tabs-wrapper { 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            gap: 6px; 
            margin-bottom: 12px; 
            width: 280px;
            margin-top: 10px; /* タイトルがない分、少し上に余白を */
        }

        #tabContainer {
            display: flex; 
            gap: 4px; 
            flex-wrap: wrap; 
        }

        .tab { 
            background: #2a2a2a !important; 
            color: #777 !important; 
            border: 1px solid #3a3a3a !important; 
            padding: 4px 10px !important; 
            border-radius: 6px; 
            font-size: 11px !important; 
            font-weight: bold; 
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab.active { 
            background: #444 !important; 
            color: #fff !important; 
            border-color: #555 !important;
        }

        .tab:hover:not(.active) {
            background: #333 !important;
            color: #aaa !important;
        }

        .action-group {
            display: flex;
            gap: 4px;
        }

        .btn-page-ctrl { 
            background: #2a2a2a !important; 
            color: #888 !important; 
            border: 1px solid #333 !important; 
            border-radius: 6px; 
            width: 28px; 
            height: 28px; 
            cursor: pointer; 
            font-size: 16px !important;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-page-ctrl:hover {
            background: #333 !important;
            border-color: #444 !important;
        }
        
        .btn-page-ctrl.confirm-delete { 
            color: #ff4444 !important; 
            border-color: #800 !important; 
            background: #400 !important;
        }

        .memo-container { 
            width: 280px; 
            height: 320px; 
            background-color: #222 !important; 
            border-radius: 12px; 
            padding: 14px; 
            border: 1px solid #333; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        textarea { 
            width: 100%; 
            height: 100%; 
            background: transparent !important; 
            border: none !important; 
            color: #e0e0e0 !important; 
            font-size: 14px !important; 
            line-height: 1.6 !important; 
            resize: none; 
            outline: none; 
            font-family: inherit !important; 
        }

        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 10px; 
            padding-top: 8px;
            border-top: 1px solid #2d2d2d;
        }
        
        .btn-time { 
            background: #2a2a2a; 
            color: #999; 
            border: 1px solid #3a3a3a; 
            padding: 4px 10px; 
            border-radius: 5px; 
            font-size: 10px; 
            font-weight: 600;
            cursor: pointer; 
            letter-spacing: 0.05em;
        }

        .btn-time:hover { background: #333; color: #fff; }

        .status { 
            font-size: 10px; 
            color: #555; 
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="tabs-wrapper">
        <div id="tabContainer"></div>
        <div class="action-group">
            <button id="addBtn" class="btn-page-ctrl">+</button>
            <button id="deleteBtn" class="btn-page-ctrl">−</button>
        </div>
    </div>
    <div class="memo-container">
        <textarea id="memoInput" placeholder="Write something..."></textarea>
        <div class="controls">
            <button id="timeBtn" class="btn-time">TIMESTAMP</button>
            <div id="saveStatus" class="status">SAVED</div>
        </div>
    </div>

<script>
    const memoInput = document.getElementById('memoInput');
    const tabContainer = document.getElementById('tabContainer');
    const addBtn = document.getElementById('addBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const timeBtn = document.getElementById('timeBtn');
    const saveStatus = document.getElementById('saveStatus');
    
    const STORAGE_KEY = 'notion_memo_data_v5_expanded';
    let pages = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[""]');
    let currentIndex = 0;
    let deleteConfirmMode = false;

    function renderTabs() {
        tabContainer.innerHTML = '';
        pages.forEach((_, idx) => {
            const btn = document.createElement('button');
            btn.className = `tab ${idx === currentIndex ? 'active' : ''}`;
            btn.textContent = idx + 1;
            btn.onclick = () => switchPage(idx);
            tabContainer.appendChild(btn);
        });
    }

    function switchPage(idx) {
        saveData();
        currentIndex = idx;
        memoInput.value = pages[currentIndex];
        resetDelete();
        renderTabs();
    }

    function saveData() {
        pages[currentIndex] = memoInput.value;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(pages));
    }

    addBtn.onclick = () => {
        if (pages.length >= 8) return; 
        saveData();
        pages.push("");
        currentIndex = pages.length - 1;
        memoInput.value = "";
        resetDelete();
        renderTabs();
        saveData();
    };

    deleteBtn.onclick = () => {
        if (pages.length <= 1) return;
        if (!deleteConfirmMode) {
            deleteConfirmMode = true;
            deleteBtn.classList.add('confirm-delete');
            saveStatus.textContent = 'DELETE?';
            saveStatus.style.color = '#ff4444';
        } else {
            pages.splice(currentIndex, 1);
            currentIndex = Math.max(0, currentIndex - 1);
            memoInput.value = pages[currentIndex];
            resetDelete();
            renderTabs();
            saveData();
        }
    };

    function resetDelete() {
        deleteConfirmMode = false;
        deleteBtn.classList.remove('confirm-delete');
        saveStatus.textContent = 'SAVED';
        saveStatus.style.color = '#555';
    }

    timeBtn.onclick = () => {
        const now = new Date();
        const stamp = `[${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}] `;
        const start = memoInput.selectionStart;
        memoInput.value = memoInput.value.substring(0, start) + stamp + memoInput.value.substring(memoInput.selectionEnd);
        memoInput.selectionStart = memoInput.selectionEnd = start + stamp.length;
        memoInput.focus();
        saveData();
    };

    memoInput.oninput = () => {
        saveData();
        saveStatus.textContent = 'TYPING...';
        setTimeout(() => { if(!deleteConfirmMode) saveStatus.textContent = 'SAVED'; }, 800);
    };

    memoInput.value = pages[currentIndex];
    renderTabs();
</script>
</body>
</html>
