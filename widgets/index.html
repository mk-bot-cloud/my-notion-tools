<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #191919; 
            margin: 0;
            padding: 10px 0; 
            display: flex;
            flex-direction: column;
            align-items: flex-start; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 220px; 
            gap: 5px;
            padding-left: 5px; 
        }

        .nav-item {
            text-decoration: none;
            display: flex;
            align-items: center;
            background-color: #262626;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #333;
            transition: all 0.2s ease;
        }

        .icon-box {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .label {
            font-size: 14px; 
            color: #efefef; 
            font-weight: 500;
            white-space: nowrap;
        }

        .nav-item:hover {
            background-color: #333;
            border-color: #444;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="https://pubmed.ncbi.nlm.nih.gov/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/pubmed.jpg"></div>
        <span class="label">PubMed</span>
    </a>
    <a href="https://www.medicalonline.jp/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/メディカルオンライン.jpg"></div>
        <span class="label">Medical Online</span>
    </a>
    <a href="https://www.carenet.com/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/carenet.png"></div>
        <span class="label">CareNet</span>
    </a>
    <a href="https://newspicks.com/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/Newspicks.png"></div>
        <span class="label">NewsPicks</span>
    </a>
    <a href="https://ledge.ai/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/Ledge.jpeg"></div>
        <span class="label">Ledge.ai</span>
    </a>
    <a href="https://ict-enews.net/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/ICT教育ニュース.png"></div>
        <span class="label">ICT教育</span>
    </a>
    <a href="https://github.com/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/Github.png"></div>
        <span class="label">GitHub</span>
    </a>
    <a href="https://www.make.com/en/login" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/make.png"></div>
        <span class="label">Make</span>
    </a>
</div>

</body>
</html>
