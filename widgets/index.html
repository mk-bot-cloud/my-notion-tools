<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #191919; 
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            /* タイトルを消したので、上詰めで配置されるように設定 */
            align-items: flex-start;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            /* 幅をさらに狭く設定（お好みで 180px〜220px 程度で調整してください） */
            width: 100%;
            max-width: 200px; 
            gap: 8px;
        }

        .nav-item {
            text-decoration: none;
            display: flex;
            align-items: center;
            background-color: #2a2a2a;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #333;
            transition: background-color 0.2s;
        }

        .icon-box {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .label {
            font-size: 13px;
            color: #ddd;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ホバー：背景を少し明るく */
        .nav-item:hover {
            background-color: #383838;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="https://pubmed.ncbi.nlm.nih.gov/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/pubmed.jpg"></div>
        <span class="label">PubMed</span>
    </a>
    <a href="https://www.medicalonline.jp/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/メディカルオンライン.jpg"></div>

    </a>
    <a href="https://www.carenet.com/" class="nav-item" target="_blank">

    </a>
    <a href="https://www.itmedia.co.jp/" class="nav-item" target="_blank">

    </a>
    <a href="https://newspicks.com/" class="nav-item" target="_blank">

    </a>
    <a href="https://ledge.ai/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/Ledge.jpeg"></div>

    </a>
    <a href="https://www.yahoo.co.jp/" class="nav-item" target="_blank">

    </a>
    <a href="https://ict-enews.net/" class="nav-item" target="_blank">

    <a href="https://www.youtube.com/" class="nav-item" target="_blank">

    </a>
    <a href="https://gemini.google.com/" class="nav-item" target="_blank">

    </a>

</body>
</html>
