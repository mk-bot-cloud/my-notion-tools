<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #191919; 
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px 0;
        }

        .title {
            color: #888888;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 20px;
            padding-bottom: 8px;
            width: 240px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        .container {
            display: flex;
            flex-direction: column; /* 縦に並べる（横並びが良ければここを grid に戻せます） */
            width: 90%;
            max-width: 300px; /* ボタンの横幅 */
            gap: 10px;
        }

        .nav-item {
            text-decoration: none;
            display: flex;
            align-items: center;
            background-color: #2a2a2a; /* ボタンの背景色 */
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #3d3d3d;
            transition: all 0.2s ease;
        }

        .icon-box {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .icon-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }

        .label {
            font-size: 14px;
            color: #ccc;
            font-weight: 500;
        }

        /* ホバー時の挙動 */
        .nav-item:hover {
            background-color: #383838;
            border-color: #555;
            transform: translateX(4px); /* 少し右にずれる演出 */
        }
        .nav-item:hover .label {
            color: #ffffff;
        }
        .nav-item:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="title">Quick Links</div>

<div class="container">
    <a href="https://pubmed.ncbi.nlm.nih.gov/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/pubmed.jpg"></div>
        <span class="label">PubMed</span>
    </a>
    <a href="https://www.medicalonline.jp/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/メディカルオンライン.jpg"></div>
        <span class="label">Medical Online</span>
    </a>
    <a href="https://www.carenet.com/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/carenet.png"></div>
        <span class="label">CareNet</span>
    </a>
    <a href="https://www.itmedia.co.jp/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/ITmedia.jpg"></div>
        <span class="label">ITmedia</span>
    </a>
    <a href="https://newspicks.com/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/Newspicks.png"></div>
        <span class="label">NewsPicks</span>
    </a>
    <a href="https://ledge.ai/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/Ledge.ai</span>
    </a>
    <a href="https://www.yahoo.co.jp/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/Yahoo!.png"></div>
        <span class="label">Yahoo!</span>
    </a>
    <a href="https://ict-enews.net/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/ICT教育ニュース.png"></div>
        <span class="label">ICT教育</span>
    </a>
    <a href="https://gemini.google.com/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/Gemini.jpg"></div>
        <span class="label">Gemini</span>
    </a>
    <a href="https://script.google.com/u/0/home/projects/..." class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/GAS.png"></div>
        <span class="label">Google Apps Script</span>
    </a>
    <a href="https://github.com/" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/Github.png"></div>
        <span class="label">GitHub</span>
    </a>
    <a href="https://www.make.com/en/login" class="nav-item" target="_blank">
        <div class="icon-box"><img src="../assets/make.png"></div>
        <span class="label">Make</span>
    </a>
</div>

</body>
</html>
