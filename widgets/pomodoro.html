<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <style>
    :root {
      --bg-color: #191919; 
      --text-color: #FFFFFF;
      --sub-text: #737373;
      --focus-color: #eb5757;
      --break-color: #2eaadc;
      --button-bg: #252525;
    }
    body {
      background: var(--bg-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: var(--text-color);
      transition: background 0.3s;
    }
    /* 時間終了時の点滅アニメーション */
    @keyframes flash {
      0%, 100% { background: var(--bg-color); }
      50% { background: #b91c1c; }
    }
    .timer-finished {
      animation: flash 0.8s infinite;
    }

    .timer-container {
      text-align: center;
      width: 220px;
      z-index: 10;
    }
    #status {
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 5px;
      color: var(--sub-text);
      text-transform: uppercase;
    }
    #time {
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 20px;
      font-variant-numeric: tabular-nums;
    }
    .settings {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .setting-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 45%;
      font-size: 0.65rem;
      color: var(--sub-text);
    }
    .setting-group input {
      width: 40px;
      border: none;
      border-bottom: 1px solid #444;
      padding: 4px;
      text-align: center;
      color: var(--text-color);
      background: transparent;
      outline: none;
      font-size: 1rem;
    }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    button {
      cursor: pointer;
      border: none;
      padding: 12px 0;
      border-radius: 8px;
      font-weight: 700;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.7; }
    #focusBtn { background: var(--focus-color); color: white; }
    #breakBtn { background: var(--break-color); color: white; }
    #stopBtn { background: var(--button-bg); color: var(--sub-text); }
  </style>
</head>
<body id="bodyTag">
  <div class="timer-container">
    <div id="status">Ready</div>
    <div id="time">25:00</div>
    
    <div class="settings">
      <div class="setting-group">
        <label>集中(分)</label>
        <input type="number" id="focusInput" value="25">
      </div>
      <div class="setting-group">
        <label>休憩(分)</label>
        <input type="number" id="breakInput" value="5">
      </div>
    </div>

    <div class="controls">
      <button id="focusBtn">集中スタート</button>
      <button id="breakBtn">休憩スタート</button>
      <button id="stopBtn">RESET / STOP</button>
    </div>
  </div>

  <script>
    let timeLeft;
    let timerId = null;
    let currentMode = "";
    const timeDisplay = document.getElementById('time');
    const statusText = document.getElementById('status');
    const focusInput = document.getElementById('focusInput');
    const breakInput = document.getElementById('breakInput');
    const bodyTag = document.getElementById('bodyTag');

    function updateDisplay() {
      const mins = Math.floor(timeLeft / 60);
      const secs = timeLeft % 60;
      const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;
      timeDisplay.textContent = timeStr;
      
      if (timerId) {
        document.title = `(${timeStr}) ${currentMode}`;
      } else {
        document.title = "Pomodoro Timer";
      }
    }

    function notifyUser(modeName) {
      // 1. 背景を点滅させる
      bodyTag.classList.add('timer-finished');
      
      // 2. タブを強調
      document.title = "！！！ TIME UP ！！！";

      // 3. 音を鳴らす
      const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
      audio.play().catch(e => console.log("Audio blocked"));

      // 4. ブラウザ標準アラート（Windows設定を無視して最前面に出る）
      setTimeout(() => {
        alert(`${modeName} が終了しました！`);
        // アラートの「OK」を押した後に点滅を止める
        bodyTag.classList.remove('timer-finished');
        document.title = "Pomodoro Timer";
      }, 100);
    }

    function startTimer(minutes, modeName, color) {
      clearInterval(timerId);
      bodyTag.classList.remove('timer-finished');
      currentMode = modeName;
      timeLeft = minutes * 60;
      statusText.textContent = modeName;
      statusText.style.color = color;
      updateDisplay();

      timerId = setInterval(() => {
        timeLeft--;
        updateDisplay();
        
        if (timeLeft <= 0) {
          clearInterval(timerId);
          timerId = null;
          updateDisplay();
          notifyUser(modeName);
        }
      }, 1000);
    }

    document.getElementById('focusBtn').addEventListener('click', () => {
      startTimer(parseInt(focusInput.value), "Focus", "var(--focus-color)");
    });

    document.getElementById('breakBtn').addEventListener('click', () => {
      startTimer(parseInt(breakInput.value), "Break", "var(--break-color)");
    });

    document.getElementById('stopBtn').addEventListener('click', () => {
      clearInterval(timerId);
      timerId = null;
      bodyTag.classList.remove('timer-finished');
      statusText.textContent = "Ready";
      statusText.style.color = "var(--sub-text)";
      timeLeft = parseInt(focusInput.value) * 60;
      updateDisplay();
    });

    // 初期起動表示
    timeLeft = parseInt(focusInput.value) * 60;
    updateDisplay();
  </script>
</body>
</html>
