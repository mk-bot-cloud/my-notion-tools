<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <style>
    :root {
      /* 背景色をより暗く(191919 -> 121212) */
      --bg-color: #121212; 
      --text-color: #e0e0e0;
      --sub-text: #666666;
      /* ボタンの明度を落として落ち着かせる */
      --focus-color: #a33c3c;
      --break-color: #267a9c;
    }
    body {
      background: var(--bg-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: flex-start; 
      align-items: center;
      height: 100vh;
      margin: 0;
      padding-left: 15px; /* 余白を少し削る */
      color: var(--text-color);
      overflow: hidden;
    }
    
    body.time-up {
      background: #7f1d1d !important; /* 終了時の赤も少し暗めに */
    }

    .timer-container {
      /* 全体サイズを少し小さく (190px -> 160px) */
      width: 160px;
      text-align: center; /* 中央寄せ */
    }
    #status {
      font-size: 0.6rem;
      font-weight: 700;
      margin-bottom: 2px;
      color: var(--sub-text);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #time {
      /* フォントサイズを少し小さく (3.5rem -> 3.0rem) */
      font-size: 3.0rem;
      font-weight: 700;
      margin-bottom: 10px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      text-align: center;
    }
    .settings {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .setting-group {
      display: flex;
      flex-direction: column;
      align-items: center; /* 設定項目も中央寄せ */
      width: 45%;
      font-size: 0.55rem;
      color: var(--sub-text);
    }
    .setting-group input {
      width: 30px;
      border: none;
      border-bottom: 1px solid #333;
      padding: 1px 0;
      text-align: center; /* 数字も中央 */
      color: var(--text-color);
      background: transparent;
      outline: none;
      font-size: 0.75rem;
    }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    button {
      cursor: pointer;
      border: none;
      padding: 8px 0;
      border-radius: 5px;
      font-weight: 700;
      font-size: 0.75rem;
      width: 100%;
      text-align: center;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.7; }
    #focusBtn { background: var(--focus-color); color: rgba(255,255,255,0.9); }
    #breakBtn { background: var(--break-color); color: rgba(255,255,255,0.9); }
    #stopBtn { background: #222222; color: #555555; }
  </style>
</head>
<body id="bodyTag">
  <div class="timer-container">
    <div id="status">Ready</div>
    <div id="time">25:00</div>
    <div class="settings">
      <div class="setting-group">
        <label>集中</label>
        <input type="number" id="focusInput" value="25">
      </div>
      <div class="setting-group">
        <label>休憩</label>
        <input type="number" id="breakInput" value="5">
      </div>
    </div>
    <div class="controls">
      <button id="focusBtn">集中スタート</button>
      <button id="breakBtn">休憩スタート</button>
      <button id="stopBtn">RESET</button>
    </div>
  </div>

  <script>
    let timeLeft;
    let timerId = null;
    let alertInterval = null;
    const body = document.getElementById('bodyTag');

    function updateDisplay() {
      const mins = Math.floor(timeLeft / 60);
      const secs = timeLeft % 60;
      const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;
      document.getElementById('time').textContent = timeStr;
    }

    function notify() {
      body.classList.add('time-up');
      
      // タブタイトルの点滅（OS通知オフでも視覚的に気づけるように）
      let toggle = true;
      alertInterval = setInterval(() => {
        document.title = toggle ? "【！】終了しました" : "　　　　　　　　";
        toggle = !toggle;
      }, 500);

      // 強制的に前面に出るアラート（Windows設定を無視して通知可能）
      setTimeout(() => {
        alert("タイマーが終了しました！");
        stopAlert();
      }, 50);
    }

    function stopAlert() {
      body.classList.remove('time-up');
      if (alertInterval) clearInterval(alertInterval);
      document.title = "Pomodoro Timer";
    }

    function startTimer(min, mode, color) {
      stopAlert();
      if (timerId) clearInterval(timerId);
      timeLeft = min * 60;
      document.getElementById('status').textContent = mode;
      document.getElementById('status').style.color = color;
      
      timerId = setInterval(() => {
        timeLeft--;
        updateDisplay();
        if (timeLeft <= 0) {
          clearInterval(timerId);
          notify();
        }
      }, 1000);
    }

    document.getElementById('focusBtn').onclick = () => startTimer(document.getElementById('focusInput').value, "Focus", "#eb5757");
    document.getElementById('breakBtn').onclick = () => startTimer(document.getElementById('breakInput').value, "Break", "#2eaadc");
    document.getElementById('stopBtn').onclick = () => {
      if (timerId) clearInterval(timerId);
      stopAlert();
      document.getElementById('status').textContent = "Ready";
      document.getElementById('status').style.color = "var(--sub-text)";
      timeLeft = document.getElementById('focusInput').value * 60;
      updateDisplay();
    };

    timeLeft = 25 * 60;
    updateDisplay();
  </script>
</body>
</html>
