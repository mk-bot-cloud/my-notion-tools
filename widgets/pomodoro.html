<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <style>
    :root {
      --bg-color: #191919; 
      --text-color: #FFFFFF;
      --sub-text: #737373;
      --focus-color: #eb5757;
      --break-color: #2eaadc;
    }
    body {
      background: var(--bg-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: var(--text-color);
      overflow: hidden;
    }
    /* 終了時に画面全体を赤くするクラス */
    body.time-up {
      background: #b91c1c !important;
    }

    .timer-container {
      text-align: center;
      width: 190px;
    }
    #status {
      font-size: 0.7rem;
      font-weight: 700;
      margin-bottom: 2px;
      color: var(--sub-text);
      text-transform: uppercase;
    }
    #time {
      font-size: 3.5rem;
      font-weight: 700;
      margin-bottom: 15px;
      font-variant-numeric: tabular-nums;
    }
    .settings {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }
    .setting-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 48%;
      font-size: 0.6rem;
      color: var(--sub-text);
    }
    .setting-group input {
      width: 35px;
      border: none;
      border-bottom: 1px solid #333;
      padding: 2px;
      text-align: center;
      color: var(--text-color);
      background: transparent;
      outline: none;
    }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    button {
      cursor: pointer;
      border: none;
      padding: 10px 0;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.8rem;
      width: 100%;
    }
    #focusBtn { background: var(--focus-color); color: white; }
    #breakBtn { background: var(--break-color); color: white; }
    #stopBtn { background: #252525; color: var(--sub-text); }
  </style>
</head>
<body id="bodyTag">
  <div class="timer-container">
    <div id="status">Ready</div>
    <div id="time">25:00</div>
    <div class="settings">
      <div class="setting-group">
        <label>集中</label>
        <input type="number" id="focusInput" value="25">
      </div>
      <div class="setting-group">
        <label>休憩</label>
        <input type="number" id="breakInput" value="5">
      </div>
    </div>
    <div class="controls">
      <button id="focusBtn">集中スタート</button>
      <button id="breakBtn">休憩スタート</button>
      <button id="stopBtn">RESET</button>
    </div>
  </div>

  <script>
    let timeLeft;
    let timerId = null;
    let alertInterval = null;
    const body = document.getElementById('bodyTag');

    function updateDisplay() {
      const mins = Math.floor(timeLeft / 60);
      const secs = timeLeft % 60;
      const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;
      document.getElementById('time').textContent = timeStr;
    }

    function notify() {
      // 1. 画面を真っ赤にする
      body.classList.add('time-up');
      
      // 2. タブの名前を激しく点滅させる（他のタブを見ていても気づくように）
      let toggle = true;
      alertInterval = setInterval(() => {
        document.title = toggle ? "！！！時間です！！！" : "　　　　　　　　　";
        toggle = !toggle;
      }, 500);

      // 3. ブラウザ標準のアラートを出す
      // アラートが出ると、ブラウザのタブが「ピコピコ」光ります
      setTimeout(() => {
        alert("タイマーが終了しました！");
        stopAlert();
      }, 100);
    }

    function stopAlert() {
      body.classList.remove('time-up');
      clearInterval(alertInterval);
      document.title = "Pomodoro Timer";
    }

    function startTimer(min, mode, color) {
      stopAlert();
      clearInterval(timerId);
      timeLeft = min * 60;
      document.getElementById('status').textContent = mode;
      document.getElementById('status').style.color = color;
      
      timerId = setInterval(() => {
        timeLeft--;
        updateDisplay();
        if (timeLeft <= 0) {
          clearInterval(timerId);
          notify();
        }
      }, 1000);
    }

    document.getElementById('focusBtn').onclick = () => startTimer(document.getElementById('focusInput').value, "Focus", "var(--focus-color)");
    document.getElementById('breakBtn').onclick = () => startTimer(document.getElementById('breakInput').value, "Break", "var(--break-color)");
    document.getElementById('stopBtn').onclick = () => {
      clearInterval(timerId);
      stopAlert();
      document.getElementById('status').textContent = "Ready";
      timeLeft = document.getElementById('focusInput').value * 60;
      updateDisplay();
    };

    timeLeft = 25 * 60;
    updateDisplay();
  </script>
</body>
</html>
