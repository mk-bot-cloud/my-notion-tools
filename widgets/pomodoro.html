<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <style>
    :root {
      /* Notionのダークモード背景色 */
      --bg-color: #191919; 
      --text-color: #e3e3e3;
      --sub-text: #737373;
      --border-color: #2e2e2e; /* 入力欄の下線用 */
      --focus-color: #eb5757;
      --break-color: #2eaadc;
    }
    body {
      background: var(--bg-color);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: flex-start; /* 左端に寄せる */
      align-items: center;
      height: 100vh;
      margin: 0;
      padding-left: 0; /* 左側の余白をゼロに */
      color: var(--text-color);
      overflow: hidden;
    }
    
    body.time-up {
      background: #3e1a1a !important; 
    }

    .timer-container {
      width: 160px;
      text-align: center;
      background-color: transparent; /* コンテナ背景を透明に */
      border: none; /* 外枠の線を削除 */
      padding: 12px 0; /* 左右のパディングをゼロに */
    }

    #status {
      font-size: 0.65rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--sub-text);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    #time {
      font-size: 2.8rem;
      font-weight: 600;
      margin-bottom: 12px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      color: var(--text-color);
    }

    .settings {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    .setting-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 45%;
      font-size: 0.6rem;
      color: var(--sub-text);
    }

    .setting-group input {
      width: 100%;
      border: 1px solid transparent;
      border-bottom: 1px solid var(--border-color);
      padding: 2px 0;
      text-align: center;
      color: var(--text-color);
      background: transparent;
      outline: none;
      font-size: 0.85rem;
      transition: border-bottom 0.2s;
    }
    
    .setting-group input:focus {
      border-bottom: 1px solid var(--sub-text);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      cursor: pointer;
      border: 1px solid var(--border-color);
      padding: 6px 0;
      border-radius: 4px;
      font-weight: 500;
      font-size: 0.75rem;
      width: 100%;
      background: transparent;
      color: var(--text-color);
      transition: background 0.2s, border-color 0.2s;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--sub-text);
    }

    #focusBtn { 
      background: var(--focus-color); 
      color: #fff; 
      border: none;
    }
    #focusBtn:hover {
      background: #cf4b4b;
    }

    #breakBtn { 
      background: var(--break-color); 
      color: #fff; 
      border: none;
    }
    #breakBtn:hover {
      background: #2899c6;
    }

    #stopBtn { 
      background: transparent;
      color: var(--sub-text); 
      border: 1px solid var(--border-color);
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>
<body id="bodyTag">
  <div class="timer-container">
    <div id="status">Ready</div>
    <div id="time">25:00</div>
    <div class="settings">
      <div class="setting-group">
        <label>集中</label>
        <input type="number" id="focusInput" value="25">
      </div>
      <div class="setting-group">
        <label>休憩</label>
        <input type="number" id="breakInput" value="5">
      </div>
    </div>
    <div class="controls">
      <button id="focusBtn">集中スタート</button>
      <button id="breakBtn">休憩スタート</button>
      <button id="stopBtn">RESET</button>
    </div>
  </div>

  <script>
    let timeLeft;
    let timerId = null;
    let alertInterval = null;
    const body = document.getElementById('bodyTag');

    function updateDisplay() {
      const mins = Math.floor(timeLeft / 60);
      const secs = timeLeft % 60;
      const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;
      document.getElementById('time').textContent = timeStr;
    }

    function notify() {
      body.classList.add('time-up');
      let toggle = true;
      alertInterval = setInterval(() => {
        document.title = toggle ? "【！】終了しました" : "　　　　　　　　";
        toggle = !toggle;
      }, 500);

      setTimeout(() => {
        alert("タイマーが終了しました！");
        stopAlert();
      }, 50);
    }

    function stopAlert() {
      body.classList.remove('time-up');
      if (alertInterval) clearInterval(alertInterval);
      document.title = "Pomodoro Timer";
    }

    function startTimer(min, mode, color) {
      stopAlert();
      if (timerId) clearInterval(timerId);
      timeLeft = min * 60;
      document.getElementById('status').textContent = mode;
      document.getElementById('status').style.color = color;
      
      timerId = setInterval(() => {
        timeLeft--;
        updateDisplay();
        if (timeLeft <= 0) {
          clearInterval(timerId);
          notify();
        }
      }, 1000);
    }

    document.getElementById('focusBtn').onclick = () => startTimer(document.getElementById('focusInput').value, "Focus", "var(--focus-color)");
    document.getElementById('breakBtn').onclick = () => startTimer(document.getElementById('breakInput').value, "Break", "var(--break-color)");
    document.getElementById('stopBtn').onclick = () => {
      if (timerId) clearInterval(timerId);
      stopAlert();
      document.getElementById('status').textContent = "Ready";
      document.getElementById('status').style.color = "var(--sub-text)";
      timeLeft = document.getElementById('focusInput').value * 60;
      updateDisplay();
    };

    timeLeft = 25 * 60;
    updateDisplay();
  </script>
</body>
</html>
